name: CI

on:
  push:
    branches:
      - '**'

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: bash ./gradlew :shared:jvmTest

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results
          path: shared/build/test-results/jvmTest/TEST-*.xml

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: snapshot-diffs
          path: shared/build/outputs/roborazzi/

      - name: Build Android app
        run: bash ./gradlew :androidApp:assembleDebug

      - name: Build wasmJs app
        run: bash ./gradlew :webApp:wasmJsBrowserDistribution