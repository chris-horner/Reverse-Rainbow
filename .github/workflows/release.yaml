name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v1

      - name: Set up JDK
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Retrieve access json
        env:
          play_access_json: ${{ secrets.play_access_json }}
        run: echo $play_access_json > androidApp/keys/play_access.json

      - name: Retrieve upload keystore
        env:
          upload_keystore: ${{ secrets.upload_keystore }}
        run: echo $upload_keystore | base64 -di > androidApp/keys/upload.keystore

      - name: Publish bundle to internal test track
        env:
          connections_planner_alias: ${{ secrets.connections_planner_alias }}
          connections_planner_password: ${{ secrets.connections_planner_password }}
        run: bash ./gradlew :androidApp:publishReleaseBundle

      - name: Update store listing
        run: bash ./gradlew :androidApp:publishReleaseListing

      - name: Build APKs
        env:
          connections_planner_alias: ${{ secrets.connections_planner_alias }}
          connections_planner_password: ${{ secrets.connections_planner_password }}
        run: bash ./gradlew :androidApp:assembleDebug :androidApp:assembleRelease

      - name: Build Compose WASM Production Distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=webApp/build/dist/wasmJs/productionExecutable --prod
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROJECT_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          body_path: androidApp/src/main/play/release-notes/en-AU/default.txt
          files: |
            androidApp/build/outputs/apk/release/androidApp-release.apk
            androidApp/build/outputs/apk/debug/androidApp-debug.apk